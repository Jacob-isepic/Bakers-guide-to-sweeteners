<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Baking Fixer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🧠 AI Baking Fixer</h2>

<div class="card">

<label>Paste Recipe (simple format)</label>
<textarea id="recipe" rows="6" style="width:100%">
Example:
200g sugar
100g butter
2 eggs
250g flour
</textarea>

<label>Sweetener Type</label>
<select id="type">
  <option value="monkfruit">Monk Fruit Blend</option>
  <option value="allulose">Allulose</option>
  <option value="pure">Pure Extract (Advanced)</option>
</select>

<button onclick="fixRecipe()">Fix Recipe</button>

</div>

<div class="card">
<pre id="out" style="white-space: pre-wrap;"></pre>
</div>

<script>
function fixRecipe() {

  let text = document.getElementById("recipe").value;
  let type = document.getElementById("type").value;

  let sugarMatch = text.match(/(\d+)\s*g\s*sugar/i);
  let sugar = sugarMatch ? Number(sugarMatch[1]) : 0;

  if (!sugar) {
    document.getElementById("out").innerText = "❌ No sugar found in recipe";
    return;
  }

  let sweet = 0;
  let structure = "";
  let moisture = "";
  let fat = "";

  if (type === "monkfruit") sweet = sugar * 0.5;
  if (type === "allulose") sweet = sugar * 1.3;
  if (type === "pure") sweet = sugar * 0.001;

  // STRUCTURE LOGIC
  if (text.toLowerCase().includes("cookie")) {
    structure = "Increase fat slightly for softness";
    moisture = "No extra liquid needed";
    fat = "+5–10% butter recommended";
  } else if (text.toLowerCase().includes("cake")) {
    structure = "Maintain liquid ratio carefully";
    moisture = "Add 1–2 tbsp milk if using allulose";
    fat = "No fat change";
  } else {
    structure = "Standard adjustment required";
    moisture = "Adjust based on batter thickness";
    fat = "Minor adjustment only";
  }

  document.getElementById("out").innerText =
`🧠 AI FIXED RECIPE

Original sugar: ${sugar}g
Sweetener needed: ~${sweet.toFixed(2)}g (${type})

────────────────────

🧁 STRUCTURE FIX
${structure}

💧 MOISTURE FIX
${moisture}

🧈 FAT FIX
${fat}

────────────────────

✔ Recipe optimised for baking stability`;
}
</script>

</body>
</html>
