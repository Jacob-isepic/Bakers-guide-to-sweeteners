<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Baking Fixer</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>🧠 AI Baking Fixer</h2>

<div class="card">

<label>Recipe</label>
<textarea id="recipe" rows="6" style="width:100%">
200g sugar
100g butter
2 eggs
250g flour
</textarea>

<label>Sweetener</label>
<select id="type">
  <option value="monkfruit">Monk Fruit Blend</option>
  <option value="allulose">Allulose</option>
  <option value="pure">Pure Extract</option>
</select>

<button onclick="fix()">Fix Recipe</button>

</div>

<div class="card">
<pre id="out" style="white-space: pre-wrap;"></pre>
</div>

<script>
function fix() {

  let text = document.getElementById("recipe").value;
  let type = document.getElementById("type").value;

  let sugarMatch = text.match(/(\d+)\s*g\s*sugar/i);
  let sugar = sugarMatch ? Number(sugarMatch[1]) : 0;

  if (!sugar) {
    document.getElementById("out").innerText = "No sugar found";
    return;
  }

  let sweet = 0;

  if (type === "monkfruit") sweet = sugar * 0.5;
  if (type === "allulose") sweet = sugar * 1.3;
  if (type === "pure") sweet = sugar * 0.001;

  let structure = "Adjust based on recipe type";

  document.getElementById("out").innerText =
`🧠 FIXED RECIPE

Sugar: ${sugar}g
Sweetener: ${sweet.toFixed(2)}g (${type})

Structure note:
${structure}`;
}
</script>

</body>
</html>
