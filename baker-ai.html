<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baker AI</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f3f4f6;
}

h2 {
  margin: 0;
  padding: 12px;
  background: white;
  border-bottom: 1px solid #e5e5e5;
}

.chat {
  height: 72vh;
  overflow-y: auto;
  padding: 12px;
}

.msg {
  max-width: 85%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  line-height: 1.4;
  white-space: pre-wrap;
}

/* USER BUBBLE */
.user {
  background: #dbeafe;
  margin-left: auto;
  text-align: right;
  font-weight: 600;
}

/* AI BUBBLE */
.ai {
  background: white;
  border: 1px solid #e5e7eb;
}

/* INPUT BAR */
.bar {
  display: flex;
  gap: 8px;
  padding: 10px;
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  border-top: 1px solid #e5e5e5;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 10px;
  outline: none;
}

button {
  padding: 12px 16px;
  border: none;
  background: #10b981;
  color: white;
  border-radius: 10px;
}
</style>

</head>

<body>

<h2>🧠 Baker AI Assistant</h2>

<div class="chat" id="chat"></div>

<div class="bar">
  <input id="input" type="text" placeholder="Talk to Baker AI..." autocomplete="off">
  <button onclick="send()">Send</button>
</div>

<script>

let context = {
  lastType: "general",
  lastIngredients: {}
};

// ================= SEND =================
function send() {

  let text = document.getElementById("input").value.trim();
  if (!text) return;

  add("You", text, "user");

  let reply = brain(text);

  add("Baker AI", reply, "ai");

  document.getElementById("input").value = "";
}

// ================= AI BRAIN =================
function brain(text) {

  let t = text.toLowerCase();

  let sugar = extract(t, "sugar");
  let flour = extract(t, "flour");
  let butter = extract(t, "butter");
  let eggs = extract(t, "egg");

  if (sugar || flour || butter || eggs) {
    context.lastIngredients = { sugar, flour, butter, eggs };
  }

  let type = context.lastType;

  if (t.includes("cookie")) type = "cookie";
  else if (t.includes("cake")) type = "cake";
  else if (t.includes("brownie")) type = "brownie";

  context.lastType = type;

  if (t.includes("rewrite") || t.includes("fix") || t.includes("improve")) {
    return rewrite(type, context.lastIngredients);
  }

  return analyze(type, sugar, flour, butter, eggs);
}

// ================= REWRITE ENGINE =================
function rewrite(type, ing) {

  let s = ing.sugar || 0;
  let f = ing.flour || 0;
  let b = ing.butter || 0;
  let e = ing.eggs || 0;

  let newSugar = Math.round(s * 0.6);
  let extract = (s * 0.001).toFixed(2);

  return `
🧠 RECIPE REWRITE (${type.toUpperCase()})

🍬 SUGAR
Original: ${s}g
Adjusted: ${newSugar}g (structure retained)
Monk fruit extract: ${extract}g

🌾 FLOUR
${f || "no change recommended"}

🧈 BUTTER
${b || "no change recommended"}

🥚 EGGS
${e || "no change recommended"}

⚖️ RESULT
- Better texture stability
- Less sugar crash
- More balanced sweetness

💡 TIP
Ask: "convert to full method"
`;
}

// ================= ANALYSIS ENGINE =================
function analyze(type, sugar, flour, butter, eggs) {

  let score = 50;

  if (sugar && flour) score += 10;
  if (butter > 80) score += 10;
  if (eggs >= 2) score += 10;

  let sugarType = detectSugarType();
  let flourType = detectFlourType();

  if (sugarType === "brown") score += 8;
  if (sugarType === "icing") score -= 5;

  if (flourType === "bread") score += 10;
  if (flourType === "cake") score -= 5;

  let texture = "Balanced structure";

  if (type === "cookie") {
    texture = flourType === "bread"
      ? "Chewy dense cookies (bread flour effect)"
      : "Classic cookie texture";
  }

  if (type === "cake") {
    texture = flourType === "cake"
      ? "Soft fine crumb cake"
      : "Standard cake structure";
  }

  if (type === "brownie") {
    texture = sugarType === "brown"
      ? "Fudgy caramel brownie"
      : "Standard brownie texture";
  }

  return `
🧠 BAKER AI (${type.toUpperCase()})

🍬 Sugar type: ${sugarType}
🌾 Flour type: ${flourType}

🧈 Butter: ${butter || "?"}
🥚 Eggs: ${eggs || "?"}

⚖️ Score: ${score}/100

🍪 Texture
${texture}

💡 Suggestion
Try: "rewrite this recipe"
`;
}

// ================= TYPE DETECTORS =================
function detectSugarType() {
  let t = lastText.toLowerCase();

  if (t.includes("brown sugar")) return "brown";
  if (t.includes("icing sugar") || t.includes("powdered sugar")) return "icing";
  if (t.includes("granulated sugar")) return "granulated";

  return "white";
}

function detectFlourType() {
  let t = lastText.toLowerCase();

  if (t.includes("bread flour")) return "bread";
  if (t.includes("cake flour")) return "cake";

  return "all-purpose";
}

// ================= HELPERS =================
let lastText = "";

function extract(text, word) {
  lastText = text;
  let m = text.match(new RegExp("(\\d+)\\s*g\\s*" + word));
  return m ? Number(m[1]) : 0;
}

// ================= UI =================
function add(sender, text, cls) {

  let div = document.createElement("div");
  div.className = "msg " + cls;

  div.innerHTML = `<b>${sender}</b>\n${text}`;

  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

</script>

</body>
</html>
