<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baker AI Chat</title>
<link rel="stylesheet" href="style.css">

<style>
body { font-family: Arial; margin: 0; }

h2 { padding: 10px; }

.chat {
  height: 65vh;
  overflow-y: auto;
  padding: 10px;
  background: #f7f7f7;
}

.msg { margin: 8px 0; }

.user { font-weight: bold; }
.ai { color: #0a7; }

.bar {
  display: flex;
  gap: 5px;
  padding: 10px;
}

input { flex: 1; padding: 10px; }
button { padding: 10px; }

.card { margin: 10px; }
</style>

</head>

<body>

<h2>🧠 Baker AI (Chat Mode)</h2>

<div class="card">

<div class="chat" id="chat"></div>

<div class="bar">
  <input id="input" placeholder="Talk to Baker AI...">
  <button onclick="send()">Send</button>
</div>

</div>

<script>

// ================= MEMORY (SESSION CONTEXT) =================
let context = {
  lastRecipe: null,
  lastType: null,
  lastIngredients: {}
};

// ================= CHAT =================
function send() {

  let text = document.getElementById("input").value.trim();
  if (!text) return;

  add("You", text, "user");

  let reply = brain(text);

  add("Baker AI", reply, "ai");

  document.getElementById("input").value = "";
}

// ================= CORE BRAIN =================
function brain(text) {

  let t = text.toLowerCase();

  let sugar = extract(t, "sugar");
  let flour = extract(t, "flour");
  let butter = extract(t, "butter");
  let eggs = extract(t, "egg");

  // ================= UPDATE MEMORY =================
  if (sugar || flour || butter || eggs) {
    context.lastIngredients = { sugar, flour, butter, eggs };
  }

  // ================= DETECT TYPE =================
  let type = context.lastType || "general";

  if (t.includes("cookie")) type = "cookie";
  else if (t.includes("cake")) type = "cake";
  else if (t.includes("brownie")) type = "brownie";

  context.lastType = type;

  // ================= REWRITE REQUEST =================
  if (t.includes("rewrite") || t.includes("improve") || t.includes("fix")) {
    context.lastRecipe = t;
    return rewriteRecipe(type, context.lastIngredients);
  }

  // ================= NORMAL ANALYSIS =================
  return analyze(type, sugar, flour, butter, eggs);
}

// ================= RECIPE REWRITER =================
function rewriteRecipe(type, ing) {

  let s = ing.sugar || 0;
  let f = ing.flour || 0;
  let b = ing.butter || 0;
  let e = ing.eggs || 0;

  let newSugar = Math.round(s * 0.6);
  let extract = (s * 0.001).toFixed(2);

  return `
🧠 RECIPE REWRITE (${type.toUpperCase()})

Here’s your improved version:

🍪 Ingredients adjustment:
• Sugar: ${s}g → ${newSugar}g (kept for structure)
• Pure sweetness: ${extract}g monk fruit extract
• Flour: ${f || "keep same"}
• Butter: ${b || "keep same"}
• Eggs: ${e || "keep same"}

✨ Why this works:
- Sugar provides structure + chew
- Extract gives sweetness without bulk loss
- Keeps texture stable instead of collapsing

💡 Result:
Better ${type}, improved moisture + consistency

Want me to convert full step-by-step method too?
`;
}

// ================= ANALYSIS =================
function analyze(type, sugar, flour, butter, eggs) {

  let score = 50;

  if (sugar && flour) score += 10;
  if (butter > 80) score += 10;
  if (eggs >= 2) score += 10;

  let texture = "Balanced structure";

  if (type === "cookie") {
    texture = sugar > flour * 0.7 ? "Soft chewy cookies" : "Crispier cookies";
  }

  if (type === "cake") {
    texture = eggs >= 3 ? "Light airy cake" : "Denser cake";
  }

  if (type === "brownie") {
    texture = butter > sugar * 0.5 ? "Fudgy brownie" : "Cakey brownie";
  }

  return `
🧠 Baker AI (${type.toUpperCase()})

I remember what we’ve been working on.

• Sugar: ${sugar || context.lastIngredients.sugar || "?"}
• Flour: ${flour || context.lastIngredients.flour || "?"}
• Butter: ${butter || context.lastIngredients.butter || "?"}
• Eggs: ${eggs || context.lastIngredients.eggs || "?"}

⚖️ Score: ${score}/100

🍪 Texture prediction:
${texture}

💬 You can say:
- "rewrite it"
- "improve this recipe"
- "convert to better ${type}"

I’ll remember what we’re working on in this chat.
`;
}

// ================= HELPERS =================
function extract(text, word) {
  let m = text.match(new RegExp("(\\d+)\\s*g\\s*" + word));
  return m ? Number(m[1]) : 0;
}

// ================= UI =================
function add(sender, text, cls) {
  let div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerHTML = `<b>${sender}:</b> ${text}`;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

</script>

</body>
</html>
