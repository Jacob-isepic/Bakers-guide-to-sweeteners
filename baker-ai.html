<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baker AI</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fff;
}

h2 {
  padding: 10px;
  margin: 0;
  background: #fff;
}

.chat {
  height: 70vh;
  overflow-y: auto;
  padding: 10px;
  background: #f7f7f7;
}

.msg {
  margin: 10px 0;
  padding: 6px;
}

.user {
  font-weight: bold;
  color: #111;
}

.ai {
  color: #0a7;
}

.bar {
  display: flex;
  gap: 8px;
  padding: 10px;
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 10px;
  outline: none;
  color: black;
  background: white;
}

input:focus {
  border-color: #0a7;
}

button {
  padding: 12px 16px;
  border: none;
  background: #0a7;
  color: white;
  border-radius: 10px;
}
</style>

</head>

<body>

<h2>🧠 Baker AI Assistant</h2>

<div class="chat" id="chat"></div>

<div class="bar">
  <input id="input" type="text" placeholder="Talk to Baker AI..." autocomplete="off">
  <button onclick="send()">Send</button>
</div>

<script>

let context = {
  lastType: "general",
  lastIngredients: {}
};

function send() {

  let text = document.getElementById("input").value.trim();
  if (!text) return;

  add("You", text, "user");

  let reply = brain(text);

  add("Baker AI", reply, "ai");

  document.getElementById("input").value = "";
}

// ================= AI BRAIN =================
function brain(text) {

  let t = text.toLowerCase();

  let sugar = extract(t, "sugar");
  let flour = extract(t, "flour");
  let butter = extract(t, "butter");
  let eggs = extract(t, "egg");

  if (sugar || flour || butter || eggs) {
    context.lastIngredients = { sugar, flour, butter, eggs };
  }

  let type = context.lastType;

  if (t.includes("cookie")) type = "cookie";
  else if (t.includes("cake")) type = "cake";
  else if (t.includes("brownie")) type = "brownie";

  context.lastType = type;

  // REWRITE MODE
  if (t.includes("rewrite") || t.includes("fix") || t.includes("improve")) {
    return rewrite(type, context.lastIngredients);
  }

  return analyze(type, sugar, flour, butter, eggs);
}

// ================= REWRITE =================
function rewrite(type, ing) {

  let s = ing.sugar || 0;
  let f = ing.flour || 0;
  let b = ing.butter || 0;
  let e = ing.eggs || 0;

  let newSugar = Math.round(s * 0.6);
  let extract = (s * 0.001).toFixed(2);

  return `
🧠 RECIPE REWRITE (${type.toUpperCase()})

Original sugar: ${s}g

• ${newSugar}g sugar (structure)
• ${extract}g monk fruit extract (sweetness)
• Flour: ${f || "same"}
• Butter: ${b || "same"}
• Eggs: ${e || "same"}

✨ Result:
Better texture stability + balanced sweetness

Ask: "make steps for this" if you want full method
`;
}

// ================= ANALYZE =================
function analyze(type, sugar, flour, butter, eggs) {

  let score = 50;

  if (sugar && flour) score += 10;
  if (butter > 80) score += 10;
  if (eggs >= 2) score += 10;

  let texture = "Balanced bake";

  if (type === "cookie") {
    texture = sugar > flour * 0.7 ? "Soft chewy cookies" : "Crispier cookies";
  }

  if (type === "cake") {
    texture = eggs >= 3 ? "Light airy cake" : "Denser cake";
  }

  if (type === "brownie") {
    texture = butter > sugar * 0.5 ? "Fudgy brownie" : "Cakey brownie";
  }

  return `
🧠 BAKER AI (${type.toUpperCase()})

• Sugar: ${sugar || context.lastIngredients.sugar || "?"}
• Flour: ${flour || context.lastIngredients.flour || "?"}
• Butter: ${butter || context.lastIngredients.butter || "?"}
• Eggs: ${eggs || context.lastIngredients.eggs || "?"}

⚖️ Score: ${score}/100

🍪 Texture:
${texture}

💬 Try:
- "rewrite it"
- "fix this recipe"
- "improve cookie"
`;
}

// ================= HELPERS =================
function extract(text, word) {
  let m = text.match(new RegExp("(\\d+)\\s*g\\s*" + word));
  return m ? Number(m[1]) : 0;
}

function add(sender, text, cls) {
  let div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerHTML = `<b>${sender}:</b> ${text}`;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

</script>

</body>
</html>
