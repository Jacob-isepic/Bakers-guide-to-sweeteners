<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baker AI</title>
<link rel="stylesheet" href="style.css">

<style>
body { font-family: Arial; margin: 0; }
h2 { padding: 10px; }

.chat {
  height: 65vh;
  overflow-y: auto;
  padding: 10px;
  background: #f7f7f7;
}

.msg {
  margin: 8px 0;
  padding: 6px;
}

.user { font-weight: bold; }
.ai { color: #0a7; }

.bar {
  display: flex;
  gap: 5px;
  padding: 10px;
}

input {
  flex: 1;
  padding: 10px;
}
button {
  padding: 10px;
}

.card {
  margin: 10px;
}
</style>

</head>

<body>

<h2>🧠 Baker AI Assistant</h2>

<div class="card">

<div class="chat" id="chat"></div>

<div class="bar">
  <input id="input" placeholder="Try: fix cookie recipe 200g sugar">
  <button onclick="send()">Send</button>
</div>

</div>

<script>

// ================= CHAT =================
function send() {

  let text = document.getElementById("input").value.trim();
  if (!text) return;

  add("You", text, "user");

  let reply = brain(text);

  add("Baker AI", reply, "ai");

  document.getElementById("input").value = "";
}

// ================= CORE AI =================
function brain(text) {

  let t = text.toLowerCase();

  let sugar = extract(t, "sugar");
  let flour = extract(t, "flour");
  let butter = extract(t, "butter");
  let eggs = extract(t, "egg");

  // ================= TYPE DETECTION =================
  let type = "general";

  if (t.includes("cookie")) type = "cookie";
  else if (t.includes("cake")) type = "cake";
  else if (t.includes("brownie")) type = "brownie";

  // ================= SCORE =================
  let score = 50;

  if (sugar && flour) score += 10;
  if (butter > 80) score += 10;
  if (eggs >= 2) score += 10;
  if (sugar > flour * 0.8) score -= 10;

  let texture = "";
  let advice = "";

  // ================= COOKIE =================
  if (type === "cookie") {

    texture = sugar > flour * 0.7
      ? "Soft chewy cookies likely"
      : "Crispier cookie texture";

    advice = pick([
      "Cookies need balance between fat and sugar for chewiness.",
      "Don’t remove all sugar — it affects structure too.",
      "Chilling dough improves texture a lot."
    ]);
  }

  // ================= CAKE =================
  else if (type === "cake") {

    texture = eggs >= 3
      ? "Light airy cake structure"
      : "Denser cake likely";

    advice = pick([
      "Cakes depend heavily on egg structure.",
      "Don’t overmix or the crumb becomes dense.",
      "Keep moisture balanced for softness."
    ]);
  }

  // ================= BROWNIE =================
  else if (type === "brownie") {

    texture = butter > sugar * 0.5
      ? "Fudgy brownie likely"
      : "More cakey brownie texture";

    advice = pick([
      "Brownies rely on fat for fudginess.",
      "Slight underbake improves texture.",
      "Sugar contributes to chewiness more than expected."
    ]);
  }

  // ================= GENERAL =================
  else {

    texture = "Unknown bake type";
    advice = pick([
      "Tell me if this is a cookie, cake, or brownie.",
      "I can optimise recipes better if I know the bake type.",
      "Send a recipe and I’ll analyse it."
    ]);
  }

  return `
🧠 BAKER AI (${type.toUpperCase()})

Ingredients detected:
• Sugar: ${sugar || "?"}
• Flour: ${flour || "?"}
• Butter: ${butter || "?"}
• Eggs: ${eggs || "?"}

⚖️ Balance Score: ${score}/100

🍪 Texture:
${texture}

🧁 Advice:
${advice}

💡 Try: "rewrite this recipe for better ${type}"
`;
}

// ================= HELPERS =================
function extract(text, word) {
  let m = text.match(new RegExp("(\\d+)\\s*g\\s*" + word));
  return m ? Number(m[1]) : 0;
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ================= UI =================
function add(sender, text, cls) {
  let div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerHTML = `<b>${sender}:</b> ${text}`;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

</script>

</body>
</html>
