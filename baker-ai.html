<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baker AI Core</title>
<link rel="stylesheet" href="style.css">
</head>

<body> 

<h2>🧠 Baker AI Core</h2>

<div class="card">

<textarea id="input" rows="8" style="width:100%">
200g sugar
100g butter
250g flour
2 eggs
</textarea>

<button onclick="analyze()">Analyze</button>
<button onclick="saveRecipe()">Save</button>
<button onclick="loadRecipe()">Load</button>

</div>

<div class="card">
<pre id="out" style="white-space: pre-wrap;"></pre>
</div>

<script>

// ================= MEMORY =================
function saveRecipe() {
  localStorage.setItem("recipe", document.getElementById("input").value);
}

function loadRecipe() {
  document.getElementById("input").value =
  localStorage.getItem("recipe") || "";
}

// ================= ANALYSIS =================
function analyze() {

  let text = document.getElementById("input").value.toLowerCase();

  let sugar = find("sugar", text);
  let flour = find("flour", text);
  let butter = find("butter", text);
  let eggs = find("egg", text);

  // SCORE
  let score = 50;

  if (sugar && flour) score += 10;
  if (butter > 80) score += 10;
  if (eggs >= 2) score += 10;
  if (sugar > flour * 0.8) score -= 10;

  score = Math.max(0, Math.min(100, score));

  // TEXTURE
  let texture = "Balanced";

  if (sugar > flour * 0.7) texture = "Soft / chewy likely";
  if (butter > sugar * 0.5) texture = "Rich / moist";
  if (flour > sugar * 1.2) texture = "Dry risk";
  if (eggs >= 3) texture = "Cakey / airy";

  document.getElementById("out").innerText =
`🧠 BAKER AI CORE

Sugar: ${sugar}
Flour: ${flour}
Butter: ${butter}
Eggs: ${eggs}

──────── SCORE ────────
${score}/100

──────── TEXTURE ────────
${texture}

✔ Analysis complete`;
}

// ================= PARSER =================
function find(word, text) {
  let m = text.match(new RegExp("(\\d+)\\s*g\\s*" + word));
  return m ? Number(m[1]) : 0;
}

</script>

</body>
</html>
