<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converter</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🧁 Recipe Converter</h2>

<div class="card">

<textarea id="recipe" rows="8" style="width:100%">
70g sugar
100g butter
200g flour
2 eggs
</textarea>

<select id="mode">
  <option value="blend">Monk Fruit Blend</option>
  <option value="allulose">Allulose</option>
  <option value="pure">Pure Hybrid (Sugar + Extract)</option>
</select>

<button onclick="convert()">Convert Recipe</button>

</div>

<div class="card">
<pre id="out"></pre>
</div>

<script>

function convert() {

  let text = document.getElementById("recipe").value;
  let mode = document.getElementById("mode").value;

  let sugarMatch = text.match(/(\d+)\s*g\s*sugar/i);
  let sugar = sugarMatch ? Number(sugarMatch[1]) : 0;

  if (!sugar) {
    document.getElementById("out").innerText = "No sugar found";
    return;
  }

  let result = "";

  // ================= BLEND =================
  if (mode === "blend") {
    result =
`🧁 REWRITTEN RECIPE

Original sugar: ${sugar}g
Replace: ${sugar}g monk fruit blend

${text.replace(/(\d+)\s*g\s*sugar/i, "")}

✔ Simple 1:1 conversion`;
  }

  // ================= ALLULOSE =================
  else if (mode === "allulose") {
    result =
`🧁 REWRITTEN RECIPE

Original sugar: ${sugar}g
Replace: ${(sugar * 1.05).toFixed(1)}g allulose

${text.replace(/(\d+)\s*g\s*sugar/i, "")}

✔ Slight moisture improvement`;
  }

  // ================= PURE HYBRID =================
  else if (mode === "pure") {

    let structure = Math.round(sugar * 0.6);
    let extract = (sugar * 0.001).toFixed(2);

    result =
`🧠 REWRITTEN HYBRID RECIPE

Original sugar: ${sugar}g

✔ Split replacement:
- ${structure}g sugar (structure)
- ${extract}g pure monk fruit extract (sweetness)

${text.replace(/(\d+)\s*g\s*sugar/i, "")}

🧁 Why:
Sugar = structure + texture
Extract = sweetness only

✔ Better baking stability than full replacement`;
  }

  document.getElementById("out").innerText = result;
}

</script>

</body>
</html>
