<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugar Engine</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🍪 Sugar Engine</h2>

<div class="card">
<label>Enter sugar amount (grams)</label>
<input type="number" id="sugar">

<label>Replace with</label>
<select id="type">
  <option value="monkfruit">Monk Fruit</option>
  <option value="allulose">Allulose</option>
</select>

<button onclick="calc()">Generate Baking Plan</button>

<h3 id="result"></h3>
<p id="note"></p>
</div>

<script>
function calc() {
  let sugar = Number(document.getElementById("sugar").value);
  let type = document.getElementById("type").value;

  if (!sugar || sugar <= 0) return;

  let result = 0;
  let message = "";

  if (type === "monkfruit") {
    result = sugar * 0.5;

    message =
      `🧁 Baking Adjustment Plan:\n\n` +
      `• Replace sugar with ~${result.toFixed(1)}g monk fruit blend\n` +
      `• Sweetness: matches original level\n` +
      `• Structure: slightly lighter texture\n\n` +
      `Tip: If using pure extract, reduce further — blends behave more like sugar.`;

  } else {
    result = sugar * 1.3;

    message =
      `🍯 Baking Adjustment Plan:\n\n` +
      `• Replace sugar with ~${result.toFixed(1)}g allulose\n` +
      `• Sweetness: slightly less intense than sugar\n` +
      `• Structure: improves browning & moisture\n\n` +
      `Tip: You can reduce sweetness intentionally — not all sugar must be replaced.`;
  }

  document.getElementById("result").innerText = message;
  document.getElementById("note").innerText =
    "✔ Adjustment generated using Baker Engine v1";
}
</script>

</body>
</html>
