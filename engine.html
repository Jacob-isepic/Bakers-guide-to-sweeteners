<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engine</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🍪 Sugar Engine</h2>

<div class="card">

<label>Sugar (g)</label>
<input type="number" id="sugar">

<label>Sweetener</label>
<select id="type">
  <option value="monkfruit">Monk Fruit Blend</option>
  <option value="allulose">Allulose</option>
  <option value="pure">Pure Extract</option>
</select>

<button onclick="calc()">Convert</button>

</div>

<div class="card">
<pre id="result"></pre>
</div>

<script>
function calc() {

  let sugar = Number(document.getElementById("sugar").value);
  let type = document.getElementById("type").value;

  if (!sugar) return;

  let result = "";

  if (type === "monkfruit") {
    result = `Monk Fruit Blend: ${sugar * 0.5}g`;
  }

  if (type === "allulose") {
    result = `Allulose: ${sugar * 1.3}g`;
  }

  if (type === "pure") {
    result = `Pure Extract (dilute first!)`;
  }

  document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
