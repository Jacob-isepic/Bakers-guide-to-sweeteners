<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engine</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🍪 Sugar Engine</h2>

<div class="card">

<input type="number" id="sugar" placeholder="Sugar (g)">

<select id="type">
  <option value="blend">Monk Fruit Blend</option>
  <option value="allulose">Allulose</option>
  <option value="pure">Pure Extract (Hybrid System)</option>
</select>

<button onclick="calc()">Convert</button>

</div>

<div class="card">
<pre id="out"></pre>
</div>

<script>

function calc() {

  let sugar = Number(document.getElementById("sugar").value);
  let type = document.getElementById("type").value;

  if (!sugar) return;

  let text = "";

  // ================= BLEND =================
  if (type === "blend") {
    text =
`🍬 MONK FRUIT BLEND

Original sugar: ${sugar}g
Replace: ${sugar}g blend (1:1)

✔ Maintains structure
✔ Simple swap
⚠ Slight browning reduction`;
  }

  // ================= ALLULOSE =================
  else if (type === "allulose") {
    text =
`🍯 ALLULOSE

Original sugar: ${sugar}g
Replace: ${(sugar * 1.05).toFixed(1)}g allulose

✔ Better moisture retention
✔ Good browning
💡 Cookies: +5% butter improves chew`;
  }

  // ================= PURE HYBRID SYSTEM =================
  else if (type === "pure") {

    let structureSugar = Math.round(sugar * 0.6);
    let extract = (sugar * 0.001).toFixed(2);

    text =
`⚗️ PURE EXTRACT HYBRID SYSTEM

Original sugar: ${sugar}g

🧁 Recommended split:
- ${structureSugar}g sugar (structure + bulk)
- ${extract}g pure monk fruit extract (sweetness)

✔ Keeps baking structure intact
✔ Uses extract safely (tiny amounts only)
✔ Prevents dryness from full sugar removal

💡 Why this works:
Sugar = structure + texture
Extract = sweetness only

⚠ Never use extract alone`;
  }

  document.getElementById("out").innerText = text;
}

</script>

</body>
</html>
