<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugar Engine</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🍪 Sugar Engine</h2>

<div class="card">

<label>Sugar (grams)</label>
<input type="number" id="sugar">

<label>Sweetener Type</label>
<select id="type">
  <option value="monkfruit">Monk Fruit Blend</option>
  <option value="allulose">Allulose</option>
  <option value="pure">Pure Monk Fruit Extract</option>
</select>

<button onclick="calc()">Generate Baking Plan</button>

</div>

<div class="card">
<pre id="result" style="white-space: pre-wrap;"></pre>
</div>

<script>
function calc() {
  let sugar = Number(document.getElementById("sugar").value);
  let type = document.getElementById("type").value;

  if (!sugar || sugar <= 0) return;

  let message = "";

  if (type === "monkfruit") {

    let blend = sugar * 0.5;

    message =
`🧁 BAKING PLAN — MONK FRUIT BLEND

Sugar input: ${sugar}g
Replace with: ~${blend.toFixed(1)}g blend

✔ Sweetness: matches sugar
✔ Texture: slightly lighter
✔ Best for cakes, cookies, muffins

💡 Tip:
Keep 10–20% real sugar if you want better browning.`;

  }

  else if (type === "allulose") {

    let allulose = sugar * 1.3;

    message =
`🍯 BAKING PLAN — ALLULOSE

Sugar input: ${sugar}g
Replace with: ~${allulose.toFixed(1)}g allulose

✔ Texture: very close to sugar
✔ Browning: good caramelisation
✔ Sweetness: slightly lower than sugar

💡 Tip:
You can reduce sweetness intentionally for balance.`;

  }

  else if (type === "pure") {

    let mg = sugar * 4;

    message =
`⚠️ PURE MONK FRUIT EXTRACT MODE

Sugar input: ${sugar}g
Estimated extract: ~${mg.toFixed(0)}mg

⚠️ Extremely concentrated
✔ Must be diluted into bulk sweetener
✔ Recommended ratio:
   1g extract → 200–300g sweetener base

🚨 Do NOT use directly in baking.`;
  }

  document.getElementById("result").innerText = message;
}
</script>

</body>
</html>
