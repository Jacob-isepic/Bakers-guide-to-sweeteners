<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugar Engine</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🍪 Sugar Engine</h2>

<div class="card">

<label>Sugar (grams)</label>
<input type="number" id="sugar">

<label>Sweetener Type</label>
<select id="type">
  <option value="monkfruit">Monk Fruit Blend</option>
  <option value="allulose">Allulose</option>
  <option value="pure">Pure Monk Fruit Extract</option>
</select>

<button onclick="calc()">Generate Baking Plan</button>

</div>

<div class="card">
<pre id="result" style="white-space: pre-wrap;"></pre>
</div>

<script>
function calc() {
  let sugar = Number(document.getElementById("sugar").value);
  let type = document.getElementById("type").value;

  if (!sugar || sugar <= 0) return;

  let message = "";

  if (type === "monkfruit") {

    let blend = sugar * 0.5;

    message =
`🧁 BAKING PLAN — MONK FRUIT BLEND

Sugar input: ${sugar}g
Replace with: ~${blend.toFixed(1)}g blend

✔ Sweetness matches sugar
✔ Slightly lighter texture
✔ Best for cakes, cookies, muffins

💡 Tip:
Keep 10–20% real sugar for better browning.`;

  }

  else if (type === "allulose") {

    let allulose = sugar * 1.3;

    message =
`🍯 BAKING PLAN — ALLULOSE

Sugar input: ${sugar}g
Replace with: ~${allulose.toFixed(1)}g allulose

✔ Very close sugar texture
✔ Good browning
✔ Slightly less sweet

💡 Tip:
You can reduce sweetness intentionally for balance.`;

  }

  else if (type === "pure") {

    let low = (sugar * 1000) / 250;
    let high = (sugar * 1000) / 150;

    message =
`⚠️ PURE MONK FRUIT EXTRACT MODE

Sugar input: ${sugar}g

📊 Estimated potency range:
• ${low.toFixed(1)} mg (high strength)
• ${high.toFixed(1)} mg (lower strength)

🧠 Reality:
✔ Not used directly in baking
✔ Must be diluted into bulk sweetener

🍯 Best ratio:
1g extract → 200–300g erythritol or allulose

🧁 Always convert before use.`;
  }

  document.getElementById("result").innerText = message;
}
</script>

</body>
</html>
