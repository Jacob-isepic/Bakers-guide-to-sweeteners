<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engine</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🍪 Sugar Engine</h2>

<div class="card">

<input type="number" id="sugar" placeholder="Sugar grams">

<select id="type">
  <option value="blend">Monk Fruit Blend</option>
  <option value="allulose">Allulose</option>
  <option value="pure">Pure Extract</option>
</select>

<button onclick="calc()">Convert</button>

</div>

<div class="card">
<pre id="result"></pre>
</div>

<script>
function calc() {

  let sugar = Number(document.getElementById("sugar").value);
  let type = document.getElementById("type").value;

  if (!sugar) return;

  let out = "";

  if (type === "blend") {
    out = `Blend: ${sugar}g (1:1 replacement)`;
  }

  if (type === "allulose") {
    out = `Allulose: ${(sugar * 1.05).toFixed(1)}g`;
  }

  if (type === "pure") {
    out =
`Pure Extract:
DO NOT use directly
Mix into bulk sweetener`;
  }

  document.getElementById("result").innerText = out;
}
</script>

</body>
</html>
