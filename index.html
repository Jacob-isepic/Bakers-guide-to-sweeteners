<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Baker AI Full System</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial;
  background: #f4f4f6;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
}

header {
  padding: 12px;
  background: white;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

/* CHAT */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* MESSAGES */
.msg {
  max-width: 85%;
  padding: 12px;
  border-radius: 12px;
  background: white;
  white-space: pre-wrap;
  line-height: 1.4;
}

.user {
  align-self: flex-end;
  background: #dbeafe;
}

.ai {
  align-self: flex-start;
  border: 1px solid #ddd;
}

/* INPUT BAR */
#bar {
  display: flex;
  padding: 10px;
  gap: 8px;
  background: white;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 12px 16px;
  background: #10b981;
  color: white;
  border: none;
  border-radius: 10px;
}
</style>

</head>

<body>

<header>🧠 Baker AI — Full System</header>

<div id="chat"></div>

<div id="bar">
  <input id="input" placeholder="Try: convert 100g sugar or settings" />
  <button onclick="send()">Send</button>
</div>

<script>

/* ================= MEMORY ================= */
let state = {
  mode: "blend", // blend | pure | extract
  lastRecipe: {},
  type: "general"
};

/* ================= MAIN INPUT ================= */
function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  add("You", text, "user");
  add("Baker AI", engine(text), "ai");

  input.value = "";
}

/* ================= ENGINE ================= */
function engine(text) {

  const t = text.toLowerCase();

  /* SETTINGS */
  if (t.includes("settings")) {
    return `
⚙️ SETTINGS

Current mode: ${state.mode}

Available:
- blend (balanced sweetener mix)
- pure (high concentration extract)
- extract (ultra concentrated monkfruit)

Change by typing:
"set mode pure"
`;
  }

  if (t.includes("set mode blend")) state.mode = "blend";
  if (t.includes("set mode pure")) state.mode = "pure";
  if (t.includes("set mode extract")) state.mode = "extract";

  /* TYPE DETECTION */
  if (t.includes("cookie")) state.type = "cookie";
  if (t.includes("cake")) state.type = "cake";
  if (t.includes("brownie")) state.type = "brownie";

  /* INGREDIENTS */
  const sugar = find(t, "sugar");
  const flour = find(t, "flour");
  const butter = find(t, "butter");

  if (sugar || flour || butter) {
    state.lastRecipe = { sugar, flour, butter };
  }

  /* CONVERTER MODE */
  if (t.includes("convert") || t.includes("rewrite")) {
    return convert(state.lastRecipe);
  }

  return analyze(sugar, flour, butter);
}

/* ================= CONVERTER (CORE UPGRADE) ================= */
function convert(r) {

  const s = r.sugar || 0;
  const f = r.flour || 0;
  const b = r.butter || 0;

  let structureSugar, extract;

  if (state.mode === "blend") {
    structureSugar = Math.round(s * 0.6);
    extract = (s * 0.0008).toFixed(3);
  }

  if (state.mode === "pure") {
    structureSugar = Math.round(s * 0.4);
    extract = (s * 0.0012).toFixed(3);
  }

  if (state.mode === "extract") {
    structureSugar = Math.round(s * 0.25);
    extract = (s * 0.002).toFixed(3);
  }

  return `
🍰 RECIPE CONVERSION (${state.type.toUpperCase()})

⚙️ Mode: ${state.mode}

🍬 Sugar System
Original: ${s}g
Structure sugar: ${structureSugar}g
Monkfruit extract: ${extract}g

🌾 Flour: ${f || "no change"}
🧈 Butter: ${b || "no change"}

🧠 Explanation:
- Structure sugar keeps baking stability
- Extract controls sweetness intensity
- Mode adjusts sweetness strength

💡 Tip: try "set mode pure" or "settings"
`;
}

/* ================= ANALYSIS ================= */
function analyze(s, f, b) {

  return `
🧠 BAKER AI

🍬 Sugar: ${s || state.lastRecipe.sugar || "?"}
🌾 Flour: ${f || state.lastRecipe.flour || "?"}
🧈 Butter: ${b || state.lastRecipe.butter || "?"}

⚙️ Mode: ${state.mode}
🍰 Type: ${state.type}

💡 Try:
- convert 100g sugar
- settings
`;
}

/* ================= HELPERS ================= */
function find(text, key) {
  const m = text.match(new RegExp("(\\d+)\\s*g\\s*" + key));
  return m ? Number(m[1]) : 0;
}

/* ================= UI ================= */
function add(sender, text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = sender + "\n\n" + text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

</script>

</body>
</html>
