<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Baker AI Engine v8</title>

<style>
html, body {
  margin:0;
  font-family:Arial;
  height:100%;
  background:#f4f4f6;
}

header{
  padding:14px;
  background:white;
  border-bottom:1px solid #ddd;
  font-weight:bold;
}

.container{
  height:100dvh;
  display:flex;
  flex-direction:column;
}

.topbar{
  display:flex;
  gap:8px;
  padding:10px;
  background:white;
  border-bottom:1px solid #ddd;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#10b981;
  color:white;
}

.output{
  flex:1;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  white-space:pre-wrap;
}

.inputBar{
  display:flex;
  padding:10px;
  gap:8px;
  background:white;
  border-top:1px solid #ddd;
}

input{
  flex:1;
  padding:12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.panel{
  background:white;
  width:90%;
  padding:12px;
  border-radius:12px;
  max-height:80%;
  overflow:auto;
}

.option{
  display:inline-block;
  padding:8px 10px;
  margin:4px;
  border-radius:8px;
  border:1px solid #ccc;
  cursor:pointer;
}

.active{
  background:#10b981;
  color:white;
}
</style>
</head>

<body>

<header>🍰 Baker AI Engine v8</header>

<div class="container">

<div class="topbar">
  <button onclick="openSettings()">⚙ Settings</button>
  <button onclick="toggleChef()">👨‍🍳 Chef Mode</button>
</div>

<div class="output" id="output"></div>

<div class="inputBar">
  <input id="input" placeholder="e.g. convert 200g sugar for cookies"/>
  <button onclick="run()">Send</button>
</div>

</div>

<!-- SETTINGS -->
<div class="modal" id="settings">
  <div class="panel">

    <h3>🍪 Ingredients</h3>
    <div id="ingredients"></div>

    <br>
    <button onclick="closeSettings()">Close</button>

  </div>
</div>

<script>

/* ================= STATE ================= */

let state = {
  chef:false,
  ingredients:{
    "white sugar":false,
    "brown sugar":false,
    "icing sugar":false,
    "monkfruit":false,
    "all purpose flour":false,
    "cake flour":false,
    "bread flour":false,
    "salted butter":false,
    "unsalted butter":false
  }
};

/* ================= OPEN/CLOSE ================= */

function openSettings(){
  document.getElementById("settings").style.display="flex";
  render();
}

function closeSettings(){
  document.getElementById("settings").style.display="none";
}

function toggleChef(){
  state.chef=!state.chef;
  log("Chef Mode", state.chef ? "ON 👨‍🍳" : "OFF");
}

/* ================= INGREDIENT UI ================= */

function render(){
  let box=document.getElementById("ingredients");
  box.innerHTML="";

  for(let k in state.ingredients){
    let el=document.createElement("div");
    el.className="option"+(state.ingredients[k]?" active":"");
    el.innerText=k;

    el.onclick=()=>{
      state.ingredients[k]=!state.ingredients[k];
      render();
    };

    box.appendChild(el);
  }
}

/* ================= ENGINE ================= */

function run(){
  let text=document.getElementById("input").value.trim();
  if(!text)return;

  log("You",text);
  log("Baker AI",process(text));
  document.getElementById("input").value="";
}

function extractAmount(t){
  let m=t.match(/(\d+)/);
  return m?Number(m[1]):100;
}

/* ================= REAL ENGINE ================= */

function process(text){

  let baseSugar = extractAmount(text);

  let sugarMultiplier = 1.0;
  let moisture = 1.0;
  let sweetness = 1.0;
  let structure = 1.0;

  /* 🍬 SUGAR LOGIC */
  if(state.ingredients["brown sugar"]){
    moisture += 0.15;
    sweetness -= 0.05;
  }

  if(state.ingredients["icing sugar"]){
    sweetness += 0.2;
    structure -= 0.1;
  }

  if(state.ingredients["monkfruit"]){
    sweetness -= 0.6;
  }

  /* 🌾 FLOUR LOGIC */
  if(state.ingredients["cake flour"]){
    structure -= 0.2;
  }

  if(state.ingredients["bread flour"]){
    structure += 0.2;
  }

  /* 🧈 BUTTER LOGIC */
  if(state.ingredients["unsalted butter"]){
    moisture += 0.05;
  }

  if(state.ingredients["salted butter"]){
    structure += 0.05;
  }

  let finalSugar = baseSugar * sweetness;

  let texture =
    moisture > 1.1 ? "very soft / moist" :
    structure > 1.1 ? "chewy / structured" :
    "balanced";

  if(state.chef){

    return `
👨‍🍳 CHEF MODE ENGINE

Base sugar: ${baseSugar}g
Adjusted sugar: ${finalSugar.toFixed(1)}g

🍪 Texture prediction:
${texture}

📊 Ingredient effects:
- moisture: ${moisture.toFixed(2)}
- structure: ${structure.toFixed(2)}
- sweetness: ${sweetness.toFixed(2)}

💡 Insight:
Your ingredient choices are actively changing the recipe outcome.
`;
  }

  return `
🧠 STANDARD MODE

Sugar: ${finalSugar.toFixed(1)}g
Texture: ${texture}

Turn on Chef Mode for deeper baking science.
`;
}

/* ================= LOG ================= */

function log(t,m){
  let d=document.createElement("div");
  d.className="card";
  d.innerText=t+"\n\n"+m;
  document.getElementById("output").appendChild(d);
  document.getElementById("output").scrollTop=999999;
}

</script>

</body>
</html>
