<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Baker AI MAX</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial;
  background: #f4f4f6;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
header {
  padding: 12px;
  background: white;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

/* CHAT AREA */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* MESSAGE BUBBLES */
.msg {
  max-width: 85%;
  padding: 12px;
  border-radius: 12px;
  background: white;
  line-height: 1.4;
  white-space: pre-wrap;
}

.user {
  align-self: flex-end;
  background: #dbeafe;
}

.ai {
  align-self: flex-start;
  border: 1px solid #ddd;
}

/* INPUT BAR */
#bar {
  display: flex;
  padding: 10px;
  gap: 8px;
  background: white;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 12px 16px;
  background: #10b981;
  color: white;
  border: none;
  border-radius: 10px;
}
</style>

</head>

<body>

<header>🧠 Baker AI MAX</header>

<div id="chat"></div>

<div id="bar">
  <input id="input" placeholder="Ask about baking..." />
  <button onclick="send()">Send</button>
</div>

<script>

/* ================= MEMORY SYSTEM ================= */
let memory = {
  lastType: "general",
  lastRecipe: {}
};

/* ================= INPUT ================= */
function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  if (!text) return;

  add("You", text, "user");
  add("Baker AI", engine(text), "ai");

  input.value = "";
}

/* ================= CORE ENGINE ================= */
function engine(text) {

  let t = text.toLowerCase();

  // detect dessert type
  if (t.includes("cookie")) memory.lastType = "cookie";
  if (t.includes("cake")) memory.lastType = "cake";
  if (t.includes("brownie")) memory.lastType = "brownie";

  let type = memory.lastType;

  let sugar = find(text, "sugar");
  let flour = find(text, "flour");
  let butter = find(text, "butter");
  let eggs = find(text, "egg");

  if (sugar || flour || butter || eggs) {
    memory.lastRecipe = { sugar, flour, butter, eggs };
  }

  if (t.includes("rewrite") || t.includes("convert") || t.includes("improve")) {
    return rewrite(type, memory.lastRecipe);
  }

  return analyze(type, sugar, flour, butter, eggs);
}

/* ================= REWRITE ENGINE ================= */
function rewrite(type, r) {

  let s = r.sugar || 0;
  let f = r.flour || 0;
  let b = r.butter || 0;
  let e = r.eggs || 0;

  // STRUCTURE LOGIC (important upgrade)
  let structureSugar = Math.round(s * 0.55);
  let extract = +(s * 0.0012).toFixed(3);

  return `
🧠 RECIPE REWRITE (${type.toUpperCase()})

🍬 Sugar System
Original: ${s}g
Structure sugar: ${structureSugar}g
Monkfruit extract (pure): ${extract}g

📌 Explanation:
- Structure sugar keeps texture stable
- Extract replaces sweetness intensity
- Prevents collapse in cookies/cakes

🌾 Flour: ${f || "no change"}
🧈 Butter: ${b || "no change"}
🥚 Eggs: ${e || "no change"}

⚖️ Result:
✔ same structure
✔ reduced sugar load
✔ balanced sweetness

💡 Try: "optimize for chewy cookies"
`;
}

/* ================= ANALYZE ENGINE ================= */
function analyze(type, s, f, b, e) {

  let score = 50;
  if (s) score += 10;
  if (f) score += 10;
  if (b > 80) score += 10;
  if (e >= 2) score += 10;

  let insight = "";

  if (type === "cookie") insight = "Chewy vs crispy depends on sugar + butter ratio";
  if (type === "cake") insight = "Cake texture depends on flour softness + egg balance";
  if (type === "brownie") insight = "Fudgy brownies = high fat + moderate flour";

  return `
🧠 BAKER AI (${type.toUpperCase()})

🍬 Sugar: ${s || memory.lastRecipe.sugar || "?"}
🌾 Flour: ${f || memory.lastRecipe.flour || "?"}
🧈 Butter: ${b || memory.lastRecipe.butter || "?"}
🥚 Eggs: ${e || memory.lastRecipe.eggs || "?"}

⚖️ Score: ${score}/100

🍰 Insight:
${insight}

💡 Say:
"rewrite recipe"
`;
}

/* ================= HELPERS ================= */
function find(text, key) {
  let m = text.match(new RegExp("(\\d+)\\s*g\\s*" + key));
  return m ? Number(m[1]) : 0;
}

/* ================= UI ================= */
function add(sender, text, cls) {
  let div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = sender + "\n\n" + text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

</script>

</body>
</html>
