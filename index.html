<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Baker AI Chef Mode</title>

<style>
html, body {
  margin: 0;
  font-family: Arial;
  height: 100%;
  background: #f4f4f6;
}

header {
  padding: 14px;
  background: white;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

.container {
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* TOP BAR */
.topbar {
  display: flex;
  gap: 8px;
  padding: 10px;
  background: white;
  border-bottom: 1px solid #ddd;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #10b981;
  color: white;
  font-size: 14px;
}

/* OUTPUT */
.output {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  background: white;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
}

/* INPUT */
.inputBar {
  display: flex;
  padding: 10px;
  gap: 8px;
  background: white;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
}

.panel {
  background: white;
  width: 90%;
  border-radius: 12px;
  padding: 12px;
  max-height: 80%;
  overflow-y: auto;
}

.option {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  margin: 5px;
  display: inline-block;
  cursor: pointer;
}

.active {
  background: #10b981;
  color: white;
}
</style>

</head>

<body>

<header>🍰 Baker AI — Chef Mode</header>

<div class="container">

<!-- TOP -->
<div class="topbar">
  <button onclick="openSettings()">⚙ Settings</button>
  <button onclick="toggleChef()">👨‍🍳 Chef Mode</button>
</div>

<!-- OUTPUT -->
<div class="output" id="output"></div>

<!-- INPUT -->
<div class="inputBar">
  <input id="input" placeholder="e.g. convert 1 cup sugar for cookies" />
  <button onclick="run()">Send</button>
</div>

</div>

<!-- SETTINGS -->
<div class="modal" id="modal">
  <div class="panel">

    <h3>⚖ Units</h3>
    <div>
      <span class="option" onclick="setUnit('g')">grams</span>
      <span class="option" onclick="setUnit('cup')">cups</span>
      <span class="option" onclick="setUnit('tbsp')">tablespoons</span>
      <span class="option" onclick="setUnit('tsp')">teaspoons</span>
      <span class="option" onclick="setUnit('halfcup')">½ cup</span>
    </div>

    <h3>🍬 Ingredients</h3>
    <div id="ingredients"></div>

    <br>
    <button onclick="closeSettings()">Done</button>

  </div>
</div>

<script>

/* ================= STATE ================= */

let state = {
  chefMode: false,
  unit: "g",
  ingredients: {
    "white sugar": false,
    "brown sugar": false,
    "icing sugar": false,
    "monkfruit": false,
    "all purpose flour": false,
    "cake flour": false,
    "bread flour": false,
    "salted butter": false,
    "unsalted butter": false
  }
};

/* ================= UI ================= */

function openSettings() {
  document.getElementById("modal").style.display = "flex";
  renderIngredients();
}

function closeSettings() {
  document.getElementById("modal").style.display = "none";
}

function setUnit(u) {
  state.unit = u;
  log("System", "Unit set to: " + u);
}

function toggleChef() {
  state.chefMode = !state.chefMode;
  log("Chef Mode", state.chefMode ? "ON 👨‍🍳" : "OFF");
}

/* ================= INGREDIENT UI ================= */

function renderIngredients() {
  let box = document.getElementById("ingredients");
  box.innerHTML = "";

  Object.keys(state.ingredients).forEach(k => {
    let div = document.createElement("span");
    div.className = "option" + (state.ingredients[k] ? " active" : "");
    div.innerText = k;

    div.onclick = () => {
      state.ingredients[k] = !state.ingredients[k];
      renderIngredients();
    };

    box.appendChild(div);
  });
}

/* ================= MAIN ================= */

function run() {
  let text = document.getElementById("input").value.trim();
  if (!text) return;

  log("You", text);
  log("Baker AI", process(text));

  document.getElementById("input").value = "";
}

/* ================= CHEF ENGINE ================= */

function process(text) {

  let t = text.toLowerCase();

  let amount = extract(text);

  if (state.chefMode) {

    return `
👨‍🍳 CHEF MODE ACTIVE

You used ${amount || "some"} ${state.unit}

🍰 I’m adjusting your recipe like a real baker:

- Unit system: ${state.unit}
- Selected ingredients are being accounted for
- Sugar balance + flour structure adjusted automatically

💡 Tip:
This mode focuses on texture + baking outcome, not just numbers.
`;
  }

  return `
🧠 STANDARD MODE

Amount detected: ${amount || "unknown"} ${state.unit}

Use Chef Mode for:
- texture advice
- ingredient balancing
- smarter baking decisions
`;
}

/* ================= HELPERS ================= */

function extract(text) {
  let m = text.match(/(\d+)/);
  return m ? Number(m[1]) : 0;
}

/* ================= LOG ================= */

function log(title, msg) {
  let div = document.createElement("div");
  div.className = "card";
  div.innerHTML = "<b>" + title + "</b><br><br>" + msg;
  document.getElementById("output").appendChild(div);
  document.getElementById("output").scrollTop = 999999;
}

</script>

</body>
</html>
