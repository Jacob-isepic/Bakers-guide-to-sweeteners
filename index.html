<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Baker AI</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: Arial;
  height: 100%;
  background: #f4f4f6;
}

/* HEADER */
header {
  padding: 14px;
  background: white;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

/* APP LAYOUT */
.container {
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* BUTTON BAR */
.controls {
  display: flex;
  gap: 8px;
  padding: 10px;
  background: white;
  border-bottom: 1px solid #ddd;
  flex-wrap: wrap;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #10b981;
  color: white;
  font-size: 14px;
}

/* OUTPUT */
.output {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* CARD */
.card {
  background: white;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #e5e5e5;
}

.title {
  font-weight: bold;
  margin-bottom: 8px;
}

/* INPUT */
.inputBar {
  display: flex;
  padding: 10px;
  gap: 8px;
  background: white;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* DEBUG BADGE */
#debug {
  font-size: 12px;
  color: #16a34a;
  padding: 6px 10px;
}
</style>

</head>

<body>

<header>🍰 Baker AI (Crash-Proof)</header>

<div class="container">

  <div class="controls">
    <button onclick="setMode('blend')">Blend</button>
    <button onclick="setMode('pure')">Pure</button>
    <button onclick="setMode('extract')">Extract</button>
    <button onclick="showSettings()">Settings</button>
  </div>

  <div id="debug">Checking system...</div>

  <div class="output" id="output"></div>

  <div class="inputBar">
    <input id="input" placeholder="e.g. convert 100g sugar" />
    <button onclick="run()">Send</button>
  </div>

</div>

<script>

"use strict";

/* ================= SAFE START ================= */
let state = {
  mode: "blend",
  last: { sugar: 0, flour: 0, butter: 0 },
  type: "general"
};

/* show JS is alive */
window.onload = function () {
  document.getElementById("debug").innerText = "JS RUNNING ✔";
  log("System", "Baker AI ready");
};

/* ================= BUTTONS ================= */

function setMode(m) {
  try {
    state.mode = m;
    log("Mode", "Switched to " + m);
  } catch (e) {
    error(e);
  }
}

function showSettings() {
  log("Settings",
    "Mode: " + state.mode + "\nBlend / Pure / Extract control system"
  );
}

/* ================= MAIN ================= */

function run() {
  try {
    let text = document.getElementById("input").value.trim();
    if (!text) return;

    log("You", text);

    let result = process(text);
    log("Baker AI", result);

    document.getElementById("input").value = "";
  } catch (e) {
    error(e);
  }
}

function process(text) {

  let t = text.toLowerCase();

  if (t.includes("cake")) state.type = "cake";
  if (t.includes("cookie")) state.type = "cookie";
  if (t.includes("brownie")) state.type = "brownie";

  let sugar = extract(text, "sugar");
  let flour = extract(text, "flour");
  let butter = extract(text, "butter");

  if (sugar || flour || butter) {
    state.last = { sugar, flour, butter };
  }

  if (t.includes("convert") || t.includes("rewrite")) {
    return convert();
  }

  return analyze();
}

/* ================= CONVERTER ================= */

function convert() {

  let s = state.last.sugar || 0;
  let f = state.last.flour || 0;
  let b = state.last.butter || 0;

  let ratio =
    state.mode === "blend" ? 0.6 :
    state.mode === "pure" ? 0.4 : 0.25;

  let mult =
    state.mode === "blend" ? 0.0008 :
    state.mode === "pure" ? 0.0012 : 0.002;

  let structure = Math.round(s * ratio);
  let extract = (s * mult).toFixed(3);

  return (
    "Mode: " + state.mode + "\n" +
    "Type: " + state.type + "\n\n" +
    "Sugar:\nOriginal: " + s + "g\nStructure: " + structure + "g\nExtract: " + extract + "g\n\n" +
    "Flour: " + (f || "no change") + "\n" +
    "Butter: " + (b || "no change")
  );
}

/* ================= ANALYZE ================= */

function analyze() {
  return (
    "Baker AI Ready\n\n" +
    "Mode: " + state.mode + "\n" +
    "Type: " + state.type + "\n\n" +
    "Try: convert 100g sugar"
  );
}

/* ================= HELPERS ================= */

function extract(text, key) {
  let m = text.match(new RegExp("(\\d+)\\s*g\\s*" + key));
  return m ? Number(m[1]) : 0;
}

/* ================= SAFE LOGGING ================= */

function log(title, msg) {
  let div = document.createElement("div");
  div.className = "card";
  div.innerHTML = "<div class='title'>" + title + "</div><pre>" + msg + "</pre>";
  document.getElementById("output").appendChild(div);
}

function error(e) {
  let div = document.createElement("div");
  div.className = "card";
  div.innerHTML = "<div class='title'>⚠ ERROR</div><pre>" + e + "</pre>";
  document.getElementById("output").appendChild(div);
  console.log(e);
}

</script>

</body>
</html>
