<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Baker AI v6</title>

<style>
html, body {
  margin: 0;
  font-family: Arial;
  height: 100%;
  background: #f4f4f6;
}

/* HEADER */
header {
  padding: 14px;
  background: white;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

/* LAYOUT */
.container {
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* SETTINGS BUTTON */
.topbar {
  display: flex;
  padding: 10px;
  background: white;
  border-bottom: 1px solid #ddd;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #10b981;
  color: white;
  font-size: 14px;
}

/* CHAT */
.output {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  background: white;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
}

/* SETTINGS MODAL */
.modal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
}

.modalContent {
  background: white;
  width: 90%;
  max-height: 80%;
  overflow-y: auto;
  border-radius: 12px;
  padding: 12px;
}

/* OPTION GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.option {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  cursor: pointer;
  user-select: none;
}

.option.active {
  background: #10b981;
  color: white;
}

/* INPUT */
.inputBar {
  display: flex;
  padding: 10px;
  gap: 8px;
  background: white;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ccc;
}
</style>

</head>

<body>

<header>🍰 Baker AI (Full Ingredient System)</header>

<div class="container">

<!-- TOP BAR -->
<div class="topbar">
  <button onclick="openSettings()">⚙ Settings</button>
</div>

<!-- OUTPUT -->
<div class="output" id="output"></div>

<!-- INPUT -->
<div class="inputBar">
  <input id="input" placeholder="Try: convert 200g sugar for cookies" />
  <button onclick="run()">Send</button>
</div>

</div>

<!-- SETTINGS MODAL -->
<div class="modal" id="modal">
  <div class="modalContent">

    <h3>🍪 Recipe Mode</h3>
    <div class="grid" id="modes"></div>

    <h3>🍬 Sugars</h3>
    <div class="grid" id="sugars"></div>

    <h3>🌾 Flour</h3>
    <div class="grid" id="flour"></div>

    <h3>🧈 Butter</h3>
    <div class="grid" id="butter"></div>

    <br>
    <button onclick="closeSettings()">Done</button>

  </div>
</div>

<script>

/* ================= STATE ================= */
let state = {
  mode: "cookie",
  sugar: {},
  flour: {},
  butter: {}
};

/* ================= OPTIONS ================= */
const modes = ["cookie","cake","brownie"];

const sugarOptions = ["white sugar","brown sugar","icing sugar","honey","maple syrup","monkfruit"];

const flourOptions = ["all purpose","cake flour","bread flour","self raising"];

const butterOptions = ["salted","unsalted","margarine"];

/* ================= SETTINGS UI ================= */

function openSettings() {
  document.getElementById("modal").style.display = "flex";
  renderOptions();
}

function closeSettings() {
  document.getElementById("modal").style.display = "none";
}

function renderOptions() {

  renderGroup("modes", modes, "mode");
  renderGroup("sugars", sugarOptions, "sugar");
  renderGroup("flour", flourOptions, "flour");
  renderGroup("butter", butterOptions, "butter");
}

function renderGroup(id, list, type) {
  let box = document.getElementById(id);
  box.innerHTML = "";

  list.forEach(item => {
    let div = document.createElement("div");
    div.className = "option";

    if (state[type][item]) div.classList.add("active");

    div.innerText = item;

    div.onclick = () => {
      if (type === "mode") {
        state.mode = item;
      } else {
        state[type][item] = !state[type][item];
      }
      renderOptions();
    };

    box.appendChild(div);
  });
}

/* ================= MAIN ================= */

function run() {
  let text = document.getElementById("input").value.trim();
  if (!text) return;

  add("You", text);

  add("Baker AI", process(text));

  document.getElementById("input").value = "";
}

/* ================= ENGINE ================= */

function process(text) {

  let t = text.toLowerCase();

  let sugar = extract(text,"sugar");

  let base = sugar || 100;

  let selectedSugars = Object.keys(state.sugar).filter(k=>state.sugar[k]);
  let selectedFlour = Object.keys(state.flour).filter(k=>state.flour[k]);
  let selectedButter = Object.keys(state.butter).filter(k=>state.butter[k]);

  let response = "";

  response += "🍰 MODE: " + state.mode + "\n\n";

  response += "🍬 SUGARS SELECTED:\n";
  response += selectedSugars.join(", ") || "none" + "\n\n";

  response += "🌾 FLOUR:\n";
  response += selectedFlour.join(", ") || "none" + "\n\n";

  response += "🧈 BUTTER:\n";
  response += selectedButter.join(", ") || "none" + "\n\n";

  response += "🔄 CONVERSION BASE: " + base + "g sugar\n\n";

  response += "💡 AI SUGGESTION:\n";

  if (state.sugar["monkfruit"]) {
    response += "- reduce sugar, use monkfruit blend for sweetness\n";
  }

  if (state.flour["bread flour"] && state.mode === "cookie") {
    response += "- expect chewier texture\n";
  }

  if (state.flour["cake flour"]) {
    response += "- softer crumb expected\n";
  }

  response += "\n✔ ready to bake";

  return response;
}

/* ================= HELPERS ================= */

function extract(text,key){
  let m = text.match(new RegExp("(\\d+)\\s*g\\s*"+key));
  return m?Number(m[1]):0;
}

/* ================= UI ================= */

function add(sender,text){
  let div=document.createElement("div");
  div.className="card";
  div.innerText=sender+"\n\n"+text;
  document.getElementById("output").appendChild(div);
  document.getElementById("output").scrollTop=999999;
}

</script>

</body>
</html>
