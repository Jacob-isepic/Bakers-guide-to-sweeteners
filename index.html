<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Baker AI Visual</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: Arial;
  height: 100%;
  background: #f4f4f6;
}

/* HEADER */
header {
  padding: 14px;
  background: white;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 52px);
}

/* TOP CONTROLS */
.controls {
  display: flex;
  gap: 8px;
  padding: 10px;
  background: white;
  border-bottom: 1px solid #ddd;
  flex-wrap: wrap;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #10b981;
  color: white;
  font-size: 14px;
}

/* INPUT */
.inputBar {
  display: flex;
  padding: 10px;
  gap: 8px;
  background: white;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* OUTPUT AREA */
.output {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* CARDS */
.card {
  background: white;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #e5e5e5;
}

.title {
  font-weight: bold;
  margin-bottom: 8px;
}

/* TAGS */
.tag {
  display: inline-block;
  padding: 4px 8px;
  margin: 2px;
  background: #e0f2fe;
  border-radius: 6px;
  font-size: 12px;
}
</style>

</head>

<body>

<header>🍰 Baker AI Visual Studio</header>

<div class="container">

  <!-- MODE BUTTONS -->
  <div class="controls">
    <button onclick="setMode('blend')">Blend Mode</button>
    <button onclick="setMode('pure')">Pure Mode</button>
    <button onclick="setMode('extract')">Extract Mode</button>
    <button onclick="showSettings()">Settings</button>
  </div>

  <!-- OUTPUT -->
  <div class="output" id="output"></div>

  <!-- INPUT -->
  <div class="inputBar">
    <input id="input" placeholder="e.g. convert 100
