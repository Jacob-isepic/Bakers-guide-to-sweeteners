<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Baker AI</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial;
  background: #f3f4f6;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
h2 {
  margin: 0;
  padding: 12px;
  background: white;
  border-bottom: 1px solid #ddd;
}

/* CHAT */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* MESSAGE */
.msg {
  max-width: 85%;
  padding: 12px;
  border-radius: 12px;
  background: white;
  line-height: 1.4;
  word-break: break-word;
}

.user {
  align-self: flex-end;
  background: #dbeafe;
  font-weight: bold;
}

.ai {
  align-self: flex-start;
  border: 1px solid #e5e5e5;
}

/* INPUT */
.bar {
  display: flex;
  gap: 8px;
  padding: 10px;
  background: white;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 12px 16px;
  background: #10b981;
  color: white;
  border: none;
  border-radius: 10px;
}
</style>

</head>

<body>

<h2>🧠 Baker AI</h2>

<div class="chat" id="chat"></div>

<div class="bar">
  <input id="input" placeholder="Ask or paste recipe..." />
  <button onclick="send()">Send</button>
</div>

<script>

let memory = {
  lastType: "general",
  lastIngredients: {}
};

function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  if (!text) return;

  add("You", text, "user");

  let reply = brain(text);

  add("Baker AI", reply, "ai");

  input.value = "";
}

/* ================= CORE BRAIN ================= */

function brain(text) {

  let t = text.toLowerCase();

  // detect dessert type
  if (t.includes("cookie")) memory.lastType = "cookie";
  if (t.includes("cake")) memory.lastType = "cake";
  if (t.includes("brownie")) memory.lastType = "brownie";

  let type = memory.lastType;

  let sugar = extract(text, "sugar");
  let flour = extract(text, "flour");
  let butter = extract(text, "butter");
  let eggs = extract(text, "egg");

  if (sugar || flour || butter || eggs) {
    memory.lastIngredients = { sugar, flour, butter, eggs };
  }

  if (t.includes("rewrite") || t.includes("convert") || t.includes("fix")) {
    return rewrite(type, memory.lastIngredients);
  }

  return analyze(type, sugar, flour, butter, eggs);
}

/* ================= REWRITE ENGINE ================= */

function rewrite(type, ing) {

  let s = ing.sugar || 0;
  let f = ing.flour || 0;
  let b = ing.butter || 0;
  let e = ing.eggs || 0;

  let sugarStruct = Math.round(s * 0.6);
  let monkfruit = (s * 0.001).toFixed(2);

  return `
🧠 RECIPE REWRITE (${type.toUpperCase()})

🍬 Sugar
Original: ${s}g
Structure sugar: ${sugarStruct}g
Monkfruit extract: ${monkfruit}g

🌾 Flour: ${f || "no change needed"}
🧈 Butter: ${b || "no change needed"}
🥚 Eggs: ${e || "no change needed"}

⚖️ WHY THIS WORKS
- Sugar reduced without collapsing structure
- Sweetness preserved using extract
- Texture stability maintained

💡 Tip: ask “make full method”
`;
}

/* ================= ANALYSIS ENGINE ================= */

function analyze(type, sugar, flour, butter, eggs) {

  let score = 50;

  if (sugar) score += 10;
  if (flour) score += 10;
  if (butter > 80) score += 10;
  if (eggs >= 2) score += 10;

  let texture = "Balanced bake";

  if (type === "cookie") {
    texture = "Cookies: texture depends on flour + sugar ratio";
  }

  if (type === "cake") {
    texture = "Cake: crumb softness depends on flour type";
  }

  if (type === "brownie") {
    texture = "Brownies: fudgy vs cakey depends on fat/sugar balance";
  }

  return `
🧠 BAKER AI (${type.toUpperCase()})

🍬 Sugar: ${sugar || memory.lastIngredients.sugar || "?"}
🌾 Flour: ${flour || memory.lastIngredients.flour || "?"}
🧈 Butter: ${butter || memory.lastIngredients.butter || "?"}
🥚 Eggs: ${eggs || memory.lastIngredients.eggs || "?"}

⚖️ Score: ${score}/100

🍰 Texture Insight
${texture}

💡 Try:
"rewrite recipe"
`;
}

/* ================= HELPERS ================= */

function extract(text, word) {
  let m = text.match(new RegExp("(\\d+)\\s*g\\s*" + word));
  return m ? Number(m[1]) : 0;
}

/* ================= UI ================= */

function add(sender, text, cls) {
  let div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerHTML = `<b>${sender}</b><br><br>${text}`;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

</script>

</body>
</html>
