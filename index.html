<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baker AI</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial;
  background: #f3f4f6;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
}

header {
  padding: 12px;
  background: white;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  max-width: 85%;
  padding: 12px;
  border-radius: 12px;
  background: white;
  white-space: pre-wrap;
}

.user {
  align-self: flex-end;
  background: #dbeafe;
}

.ai {
  align-self: flex-start;
  border: 1px solid #ddd;
}

#bar {
  display: flex;
  padding: 10px;
  gap: 8px;
  background: white;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 12px 16px;
  background: #10b981;
  color: white;
  border: none;
  border-radius: 10px;
}
</style>

</head>

<body>

<header>🧠 Baker AI</header>

<div id="chat"></div>

<div id="bar">
  <input id="input" placeholder="Ask about baking..." />
  <button onclick="send()">Send</button>
</div>

<script>

let memory = {
  type: "general",
  last: {}
};

function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  add("You", text, "user");

  const reply = process(text);

  add("Baker AI", reply, "ai");

  input.value = "";
}

function process(text) {

  const t = text.toLowerCase();

  if (t.includes("cookie")) memory.type = "cookie";
  if (t.includes("cake")) memory.type = "cake";
  if (t.includes("brownie")) memory.type = "brownie";

  const sugar = extract(text, "sugar");
  const flour = extract(text, "flour");
  const butter = extract(text, "butter");

  if (sugar || flour || butter) {
    memory.last = { sugar, flour, butter };
  }

  if (t.includes("rewrite") || t.includes("convert")) {
    return rewrite(sugar, flour, butter);
  }

  return analyze(sugar, flour, butter);
}

function rewrite(s, f, b) {

  s = s || memory.last.sugar || 0;
  f = f || memory.last.flour || 0;
  b = b || memory.last.butter || 0;

  const structureSugar = Math.round(s * 0.6);
  const extract = (s * 0.001).toFixed(3);

  return `
🍰 RECIPE REWRITE

Original sugar: ${s}g
Structure sugar: ${structureSugar}g
Monkfruit extract: ${extract}g

Flour: ${f || "no change"}
Butter: ${b || "no change"}

✔ balanced sweetness
✔ preserved structure
✔ reduced sugar load
`;
}

function analyze(s, f, b) {

  return `
🧠 BAKER AI

Sugar: ${s || memory.last.sugar || "?"}
Flour: ${f || memory.last.flour || "?"}
Butter: ${b || memory.last.butter || "?"}

💡 Try:
"rewrite recipe"
`;
}

function extract(text, word) {
  const match = text.match(new RegExp("(\\d+)\\s*g\\s*" + word));
  return match ? Number(match[1]) : 0;
}

function add(sender, text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = sender + "\n\n" + text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

</script>

</body>
</html>
