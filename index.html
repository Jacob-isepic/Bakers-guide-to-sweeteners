<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Baker AI</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial;
  background: #f3f4f6;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
h2 {
  margin: 0;
  padding: 12px;
  background: white;
  border-bottom: 1px solid #ddd;
  flex-shrink: 0;
}

/* CHAT */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* MESSAGE */
.msg {
  max-width: 85%;
  padding: 12px;
  border-radius: 12px;
  background: white;
  word-break: break-word;
  line-height: 1.4;
}

/* USER */
.user {
  align-self: flex-end;
  background: #dbeafe;
  font-weight: bold;
}

/* AI */
.ai {
  align-self: flex-start;
  border: 1px solid #e5e5e5;
}

/* INPUT BAR */
.bar {
  display: flex;
  gap: 8px;
  padding: 10px;
  background: white;
  border-top: 1px solid #ddd;
  flex-shrink: 0;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 10px;
}

button {
  padding: 12px 16px;
  background: #10b981;
  color: white;
  border: none;
  border-radius: 10px;
}
</style>

</head>

<body>

<h2>🧠 Baker AI</h2>

<div class="chat" id="chat"></div>

<div class="bar">
  <input id="input" placeholder="Ask about baking..." />
  <button onclick="send()">Send</button>
</div>

<script>

let context = {
  lastType: "general",
  lastIngredients: {}
};

function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  if (!text) return;

  add("You", text, "user");
  add("Baker AI", brain(text), "ai");

  input.value = "";
}

function brain(text) {

  let t = text.toLowerCase();

  // detect recipe type
  let type = context.lastType;

  if (t.includes("cookie")) type = "cookie";
  else if (t.includes("cake")) type = "cake";
  else if (t.includes("brownie")) type = "brownie";

  context.lastType = type;

  // ingredient extraction
  let sugar = extract(text, "sugar");
  let flour = extract(text, "flour");
  let butter = extract(text, "butter");
  let eggs = extract(text, "egg");

  if (sugar || flour || butter || eggs) {
    context.lastIngredients = { sugar, flour, butter, eggs };
