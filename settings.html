<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>⚙️ Working Settings</h2>

<div class="card">

<h3>Default Sweetener</h3>

<select id="defaultSweetener">
  <option value="blend">Monk Fruit Blend</option>
  <option value="allulose">Allulose</option>
  <option value="pure">Pure Extract (Advanced)</option>
</select>

<button onclick="saveSettings()">Save Settings</button>

</div>

<div class="card">

<h3>Sweetness Mode</h3>

<select id="sweetMode">
  <option value="normal">Normal Sweetness</option>
  <option value="reduced">Reduced Sweetness</option>
  <option value="lowcarb">Low Carb (less sweet)</option>
</select>

</div>

<div class="card">
<b>Status:</b>
<pre id="status">Not saved</pre>
</div>

<script>
function saveSettings() {
  let sweetener = document.getElementById("defaultSweetener").value;
  let mode = document.getElementById("sweetMode").value;

  localStorage.setItem("sweetener", sweetener);
  localStorage.setItem("mode", mode);

  document.getElementById("status").innerText =
`Saved:
Default Sweetener = ${sweetener}
Mode = ${mode}`;
}

// load existing settings
window.onload = function() {
  let s = localStorage.getItem("sweetener");
  let m = localStorage.getItem("mode");

  if (s) document.getElementById("defaultSweetener").value = s;
  if (m) document.getElementById("sweetMode").value = m;
}
</script>

</body>
</html>
