<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>⚙️ Settings</h2>

<div class="card">

<select id="sweetener">
  <option value="monkfruit">Monk Fruit</option>
  <option value="allulose">Allulose</option>
  <option value="pure">Pure</option>
</select>

<select id="mode">
  <option value="normal">Normal</option>
  <option value="low">Low Carb</option>
</select>

<button onclick="save()">Save</button>

</div>

<script>
function save() {
  localStorage.setItem("sweetener", document.getElementById("sweetener").value);
  localStorage.setItem("mode", document.getElementById("mode").value);
}

window.onload = function() {
  document.getElementById("sweetener").value =
  localStorage.getItem("sweetener") || "monkfruit";

  document.getElementById("mode").value =
  localStorage.getItem("mode") || "normal";
}
</script>

</body>
</html>
